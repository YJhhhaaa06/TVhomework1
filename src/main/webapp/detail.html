    /**
     * 统一请求函数
     * @param url 请求地址
     * @param options 配置项 (method, body, headers 等)
     */
    async function request(url, options = {}) {
        // 1. 自动获取本地存储的 Token
        const token = localStorage.getItem("userToken");

        // 2. 设置默认 Header
        const defaultHeaders = {
            "Content-Type": "application/x-www-form-urlencoded"
        };

        // 3. 如果有 Token，则带上 (这里建议放在 Header 的 'token' 字段，后端通过 req.getHeader("token") 获取)
        if (token) {
            defaultHeaders["Token"] = token;
        }

        // 合并用户传入的 options
        const config = {
            method: options.method || "GET", // 默认为 GET
            headers: { ...defaultHeaders, ...options.headers },
            ...options
        };

        try {
            const response = await fetch(url, config);

            // 如果后端返回 401 或特定的错误码，说明 Token 失效，直接跳登录页
            if (response.status === 401) {
                alert("登录已过期，请重新登录");
                window.location.href = "login.html";
                return;
            }

            const data = await response.json();
            return data;
        } catch (error) {
            console.error("请求失败:", error);
            throw error;
        }
    }

        let currentParentId = 0;
        let params = new URLSearchParams(window.location.search);
        let videoId = params.get("videoId");

        // 页面启动加载
        if (!videoId) {
        alert("未找到视频ID");
    } else {
        loadVideoDetail(videoId);
        loadComments(videoId);

        // --- 1. 加载视频详情 ---
        async function loadVideoDetail(videoId) {
        const data = await request(`/MyAPP/video?action=IdSearch&videoId=${videoId}`);
        if (data && data.code === 0) {
        let v = data.data;
        document.getElementById("video").innerHTML = `
                <h3>${v.title}</h3>
                <p>ID: ${v.videoId} | 作者: ${v.authorName}</p>
                <p>${v.intro}</p>
                <a href="${v.url}" target="_blank">▶ 点击播放视频</a>
            `;
    } else {
        document.getElementById("video").innerText = data ? data.msg : "加载失败";
    }
    }

        // --- 2. 加载评论列表 ---
        async function loadComments(videoId) {
        const data = await request(`/MyAPP/comment?action=show`, {
        method: 'POST',
        body: `videoId=${videoId}`
    });

        if (data && data.code === 0) {
        renderComments(data.data);
    }
    }

        // --- 3. 发表评论 ---
        async function sendComment() {
        let content = document.getElementById("content").value.trim();
        if (!content) { alert("内容不能为空"); return; }

        const data = await request("/MyAPP/comment?action=add", {
        method: "POST",
        body: `videoId=${videoId}&content=${encodeURIComponent(content)}&parentId=${currentParentId}`
    });

        if (data && data.code === 0) {
        alert("发表成功");
        resetCommentInput();
        loadComments(videoId); // 刷新列表
    } else {
        alert("发表失败: " + data.msg);
    }
    }

        // --- 辅助函数：渲染评论 ---
        function renderComments(comments) {
        let div = document.getElementById("commentList");
        div.innerHTML = "";
        if (!comments || comments.length === 0) {
        div.innerText = "暂无评论";
        return;
    }
        comments.forEach(c => {
        div.appendChild(createCommentItem(c, 0));
    });
    }

        function createCommentItem(comment, level) {
        let div = document.createElement("div");
        div.className = "comment-item";
        div.style.marginLeft = (level * 20) + "px";
        div.style.borderBottom = "1px solid #eee";
        div.style.padding = "10px 5px";

        div.innerHTML = `
            <div>
                <b style="color:blue">${comment.username}</b>: ${comment.content}
                <button onclick="reply(${comment.commentId}, '${comment.username}')" style="font-size:12px">回复</button>
            </div>
        `;

        if (comment.children && comment.children.length > 0) {
        comment.children.forEach(child => {
        div.appendChild(createCommentItem(child, level + 1));
    });
    }
        return div;
    }

        function reply(commentId, userName) {
        currentParentId = commentId;
        const input = document.getElementById("content");
        input.placeholder = "回复 @" + userName + "：";
        input.focus();
    }

        function resetCommentInput() {
        currentParentId = 0;
        document.getElementById("content").value = "";
        document.getElementById("content").placeholder = "输入评论";
    }

        function cancelReply() {
        resetCommentInput();
    }

    function goHome() {
