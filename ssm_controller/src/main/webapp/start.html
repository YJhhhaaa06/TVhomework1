<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>首页 - 推荐视频</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        /* 顶部栏 */
        .header {
            background: #fff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .user {
            color: blue;
            cursor: pointer;
        }

        /* 视频列表 */
        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.03);
            transition: 0.2s;
        }

        .title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .author {
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- 顶部 -->
<div class="header">
    <div class="logo">🐧 视频首页</div>



    <div>
        <button onclick="refreshVideos()">🔄 刷新</button>
        <button onclick="goSearch()">🔍 搜索</button>

        <span id="userInfo"></span>
        <span class="user" onclick="logout()">退出登录</span>
    </div>
</div>

<!-- 视频列表 -->
<div class="container" id="videoList"></div>

<script>

    // ========= 初始化 =========
    checkLogin();
    loadVideos();

    // ========= 统一请求 =========
    function request(url, options = {}) {
        let token = localStorage.getItem("userToken");

        options.headers = {
            "Content-Type": "application/x-www-form-urlencoded",
            ...options.headers
        };

        if (token) {
            options.headers["token"] = token;
        }

        return fetch(url, options)
            .then(res => res.json())
            .then(data => {
                if (data.code === 401) {
                    alert("请先登录");
                    window.location.href = "/MyAPP/login.html";
                }
                return data;
            });
    }

    // ========= 检查登录 =========
    function checkLogin() {
        let token = localStorage.getItem("userToken");
        let username=localStorage.getItem("username");

        let userInfo=document.getElementById("userInfo")
        if (!token) {
            document.getElementById("userInfo").innerText = "未登录";
            userInfo.innerText="未登录";
        } else {
            document.getElementById("userInfo").innerText = username;
            userInfo.innerText="欢迎，"+(username || "用户");
        }
    }

    // ========= 加载推荐视频 =========
    function loadVideos() {
        request("/MyAPP/start")
            .then(data => {

                if (data.code !== 0) {
                    alert(data.msg);
                    return;
                }

                let list = data.data;
                let container = document.getElementById("videoList");

                container.innerHTML = "";

                list.forEach(video => {
                    let div = document.createElement("div");
                    div.className = "card";

                    div.onclick = function () {
                        goDetail(video.videoId);
                    };

                    div.innerHTML = `
                        <div class="title">${video.videoTitle}</div>
                        <div class="author">作者：${video.authorName}</div>
                        <div>${video.briefIntroduction || ""}</div>
                    `;

                    container.appendChild(div);
                });

            });
    }

    // ========= 跳转详情 =========
    function goDetail(id) {
        window.location.href = `/MyAPP/detail.html?videoId=${id}`;
    }

    // ========= 退出登录 =========
    function logout() {
        localStorage.removeItem("userToken");
        alert("已退出登录");
        window.location.href = "/MyAPP/login.html";
    }

    //刷新
    function refreshVideos() {
        loadVideos();
    }

    //跳转搜索
    function goSearch() {
    window.location.href = "/MyAPP/video.html";
    }


</script>

</body>
</html>
