    function search() {
        let keyword = document.getElementById("keyword").value;
        keyword = encodeURIComponent(keyword);

        request(`/MyAPP/video?action=keywordSearch&keyword=${keyword}`)
            .then(data => {

                let listDiv = document.getElementById("list");
                listDiv.innerHTML = "";

                if (data.code !== 0) {
                    listDiv.innerText = data.msg;
                    return;
                }

                let videos = data.data;

                videos.forEach(video => {
                    let div = document.createElement("div");

                    div.innerHTML = `
                    <h3>${video.videoTitle}</h3>
                    <p>${video.authorName}</p>
                    <p>${video.briefIntroduction}</p>
                    <button onclick="goDetail(${video.videoId})">查看详情</button>
                    <hr>
                `;
                    listDiv.appendChild(div);
                });
            });
    }

    //跳转
    function goDetail(id) {
        window.location.href = `/MyAPP/detail.html?videoId=${id}`;
    }


    function request(url, options = {}) {

        let token = localStorage.getItem("userToken");

        // 默认 headers
        let defaultHeaders = {
            "Content-Type": "application/x-www-form-urlencoded"
        };

        // 合并 headers
        options.headers = {
            ...defaultHeaders,
            ...options.headers
        };

        // 👇 自动带 token（有才带）
        if (token) {
            options.headers["token"] = token;
        }

        return fetch(url, options)
            .then(res => {
                if (!res.ok) {
                    throw new Error("HTTP错误：" + res.status);
                }
                return res.json();
            })
            .catch(err => {
                console.error("请求失败：", err);
                throw err;
            });
    }

    //跳转开始页面
    function goHome() {
